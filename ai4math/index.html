<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI for Mathematics — XMUM</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0d3b5e 0%, #1a5276 50%, #2471a3 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
    }
    .container {
      background: white;
      border-radius: 16px;
      padding: 48px;
      max-width: 700px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 {
      color: #003366;
      font-size: 2em;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #666;
      font-size: 1.1em;
      margin-bottom: 32px;
    }
    .week-list {
      list-style: none;
    }
    .week-list li {
      margin-bottom: 8px;
    }
    .week-list a {
      display: block;
      padding: 14px 20px;
      background: linear-gradient(135deg, #e6f0ff, #cce0ff);
      border-left: 4px solid #0066cc;
      border-radius: 8px;
      color: #003366;
      text-decoration: none;
      font-size: 1.05em;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .week-list a:hover {
      transform: translateX(4px);
      box-shadow: 0 2px 8px rgba(0,102,204,0.2);
    }
    footer {
      margin-top: 32px;
      color: #999;
      font-size: 0.85em;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>AI for Mathematics</h1>
    <p class="subtitle">XMUM General Elective — April Semester 2026</p>

    <ul class="week-list">
      <li><a href="week01/">Week 1: From Counting to AI</a></li>
    </ul>

    <footer>
      Instructor: Ma Jiajun &middot; Tuesday 3:00–6:00pm
    </footer>
  </div>
</body>
</html>
