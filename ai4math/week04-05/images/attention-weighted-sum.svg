<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" role="img" aria-label="Attention weighted sum">
  <rect width="900" height="500" rx="26" fill="#f7fbff"/>
  <text x="450" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#003366">Attention Is a Weighted Sum</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#0066cc"/></marker>
  </defs>
  <rect x="68" y="106" width="132" height="54" rx="12" fill="#eef5ff" stroke="#0066cc" stroke-width="3"/><text x="134" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" fill="#003366">The</text>
  <rect x="218" y="106" width="132" height="54" rx="12" fill="#e8f8e8" stroke="#1a8a3a" stroke-width="3"/><text x="284" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" fill="#0d5c25">cat</text>
  <rect x="368" y="106" width="132" height="54" rx="12" fill="#fff4e6" stroke="#e07000" stroke-width="3"/><text x="434" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#7a3f00">sat</text>
  <rect x="518" y="106" width="132" height="54" rx="12" fill="#eef5ff" stroke="#0066cc" stroke-width="3"/><text x="584" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" fill="#003366">near</text>
  <rect x="668" y="106" width="132" height="54" rx="12" fill="#eef5ff" stroke="#0066cc" stroke-width="3"/><text x="734" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" fill="#003366">me</text>
  <text x="450" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" fill="#003366">For the position "sat", compute weights over visible positions.</text>
  <line x1="434" y1="166" x2="134" y2="265" stroke="#0066cc" stroke-width="3" stroke-linecap="round"/>
  <line x1="434" y1="166" x2="284" y2="265" stroke="#1a8a3a" stroke-width="8" stroke-linecap="round"/>
  <line x1="434" y1="166" x2="434" y2="265" stroke="#e07000" stroke-width="5" stroke-linecap="round"/>
  <line x1="434" y1="166" x2="584" y2="265" stroke="#0066cc" stroke-width="3" stroke-linecap="round"/>
  <line x1="434" y1="166" x2="734" y2="265" stroke="#0066cc" stroke-width="2" stroke-linecap="round"/>
  <text x="134" y="293" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#003366">0.05</text>
  <text x="284" y="293" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#0d5c25">0.55</text>
  <text x="434" y="293" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#7a3f00">0.25</text>
  <text x="584" y="293" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#003366">0.10</text>
  <text x="734" y="293" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#003366">0.05</text>
  <rect x="138" y="335" width="624" height="70" rx="16" fill="white" stroke="#003366" stroke-width="4"/>
  <text x="450" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#003366">y_n = sum_m a_nm v_m</text>
  <text x="450" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#003366">The weights a_nm are nonnegative and each row sums to 1.</text>
  <rect x="160" y="432" width="580" height="44" rx="12" fill="#fff4e6" stroke="#e07000" stroke-width="3"/>
  <text x="450" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#7a3f00">Attention weights change with the input. They are not fixed model parameters.</text>
</svg>
