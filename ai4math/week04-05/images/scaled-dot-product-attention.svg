<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" role="img" aria-label="Scaled dot product attention">
  <rect width="900" height="500" rx="26" fill="#f7fbff"/>
  <text x="450" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#003366">Scaled Dot-Product Attention</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#0066cc"/></marker>
  </defs>
  <rect x="55" y="112" width="150" height="86" rx="15" fill="#e6f0ff" stroke="#0066cc" stroke-width="4"/>
  <text x="130" y="147" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#003366">Q</text>
  <text x="130" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#003366">N x d_k</text>
  <rect x="55" y="220" width="150" height="86" rx="15" fill="#fff4e6" stroke="#e07000" stroke-width="4"/>
  <text x="130" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#7a3f00">K</text>
  <text x="130" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#7a3f00">N x d_k</text>
  <rect x="55" y="328" width="150" height="86" rx="15" fill="#e8f8e8" stroke="#1a8a3a" stroke-width="4"/>
  <text x="130" y="363" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#0d5c25">V</text>
  <text x="130" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#0d5c25">N x d_v</text>
  <path d="M205 198 C235 213 255 230 282 250" stroke="#0066cc" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
  <path d="M205 263 H282" stroke="#0066cc" stroke-width="5" marker-end="url(#arrow)"/>
  <rect x="300" y="195" width="215" height="110" rx="16" fill="white" stroke="#003366" stroke-width="4"/>
  <text x="407" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#003366">scores</text>
  <text x="407" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#003366">Q K^T / sqrt(d_k)</text>
  <text x="407" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#003366">shape: N x N</text>
  <path d="M515 250 H575" stroke="#0066cc" stroke-width="5" marker-end="url(#arrow)"/>
  <rect x="592" y="195" width="190" height="110" rx="16" fill="#e6f0ff" stroke="#0066cc" stroke-width="4"/>
  <text x="687" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#003366">softmax</text>
  <text x="687" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#003366">row by row</text>
  <text x="687" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#003366">A = attention matrix</text>
  <path d="M205 371 C315 395 595 395 650 317" stroke="#1a8a3a" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
  <rect x="328" y="84" width="244" height="70" rx="16" fill="#fff4e6" stroke="#e07000" stroke-width="4"/>
  <text x="450" y="113" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#7a3f00">output</text>
  <text x="450" y="139" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#7a3f00">Y = A V</text>
  <path d="M687 195 C660 142 610 119 580 119" stroke="#0066cc" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
  <rect x="195" y="438" width="510" height="42" rx="12" fill="white" stroke="#003366" stroke-width="3"/>
  <text x="450" y="465" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#003366">The scaling by sqrt(d_k) keeps dot products from making softmax too saturated.</text>
</svg>
