<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" role="img" aria-label="Embedding space diagram">
  <rect width="900" height="500" rx="26" fill="#f7fbff"/>
  <text x="450" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#003366">Embeddings: Tokens Become Vectors</text>
  <rect x="62" y="100" width="245" height="275" rx="16" fill="white" stroke="#0066cc" stroke-width="4"/>
  <text x="185" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#003366">lookup table</text>
  <text x="90" y="190" font-family="Menlo, monospace" font-size="18" fill="#003366">token 9221</text>
  <text x="90" y="220" font-family="Menlo, monospace" font-size="18" fill="#003366">token 4719</text>
  <text x="90" y="250" font-family="Menlo, monospace" font-size="18" fill="#003366">token 527</text>
  <text x="90" y="292" font-family="Arial, sans-serif" font-size="18" fill="#003366">each ID gets a vector</text>
  <text x="90" y="322" font-family="Menlo, monospace" font-size="17" fill="#003366">[0.12, -0.03, ...]</text>
  <path d="M330 238 H395" stroke="#0066cc" stroke-width="5" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#0066cc"/></marker></defs>
  <rect x="420" y="100" width="410" height="275" rx="16" fill="#eef5ff" stroke="#0066cc" stroke-width="4"/>
  <line x1="470" y1="330" x2="780" y2="330" stroke="#003366" stroke-width="3"/>
  <line x1="500" y1="350" x2="500" y2="140" stroke="#003366" stroke-width="3"/>
  <circle cx="590" cy="205" r="13" fill="#0066cc"/><text x="610" y="211" font-family="Arial, sans-serif" font-size="17" fill="#003366">prime</text>
  <circle cx="625" cy="235" r="13" fill="#0066cc"/><text x="645" y="241" font-family="Arial, sans-serif" font-size="17" fill="#003366">number</text>
  <circle cx="665" cy="218" r="13" fill="#0066cc"/><text x="685" y="224" font-family="Arial, sans-serif" font-size="17" fill="#003366">integer</text>
  <circle cx="545" cy="285" r="13" fill="#e07000"/><text x="565" y="291" font-family="Arial, sans-serif" font-size="17" fill="#7a3f00">movie</text>
  <circle cx="572" cy="310" r="13" fill="#e07000"/><text x="592" y="316" font-family="Arial, sans-serif" font-size="17" fill="#7a3f00">actor</text>
  <text x="625" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#003366">learned geometric representation</text>
  <text x="450" y="442" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#003366">Embeddings are learned during training; nearby vectors often behave similarly in context.</text>
</svg>
