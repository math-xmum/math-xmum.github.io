<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520">
  <rect width="900" height="520" fill="#ffffff"/>
  <text x="450" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#003366">GitHub Flow for Student Projects</text>
  <g font-family="Arial, sans-serif" text-anchor="middle" font-size="20">
    <rect x="80" y="125" width="130" height="78" rx="12" fill="#e6f0ff" stroke="#0066cc" stroke-width="3"/>
    <text x="145" y="158" font-weight="700" fill="#003366">Issue</text>
    <text x="145" y="184" fill="#444">what to do</text>
    <rect x="260" y="125" width="130" height="78" rx="12" fill="#fff4e6" stroke="#e07000" stroke-width="3"/>
    <text x="325" y="158" font-weight="700" fill="#7a3f00">Branch</text>
    <text x="325" y="184" fill="#444">one task</text>
    <rect x="440" y="125" width="130" height="78" rx="12" fill="#e8f8e8" stroke="#1a8a3a" stroke-width="3"/>
    <text x="505" y="158" font-weight="700" fill="#0f5f28">Commit</text>
    <text x="505" y="184" fill="#444">small steps</text>
    <rect x="620" y="125" width="130" height="78" rx="12" fill="#f8f8ff" stroke="#5b5fc7" stroke-width="3"/>
    <text x="685" y="158" font-weight="700" fill="#33338a">Pull Req.</text>
    <text x="685" y="184" fill="#444">review diff</text>
    <rect x="350" y="315" width="200" height="78" rx="12" fill="#e6f0ff" stroke="#0066cc" stroke-width="3"/>
    <text x="450" y="348" font-weight="700" fill="#003366">Merge to Main</text>
    <text x="450" y="374" fill="#444">after checks pass</text>
  </g>
  <g stroke="#0066cc" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M210 164 L260 164"/>
    <path d="M390 164 L440 164"/>
    <path d="M570 164 L620 164"/>
    <path d="M685 203 C685 285 560 320 550 350"/>
  </g>
  <path d="M450 393 C450 435 155 430 145 203" stroke="#1a8a3a" stroke-width="4" fill="none" marker-end="url(#arrow2)"/>
  <text x="330" y="448" font-family="Arial, sans-serif" font-size="20" fill="#0f5f28" font-weight="700">merged result closes or updates the issue</text>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#0066cc"/></marker>
    <marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#1a8a3a"/></marker>
  </defs>
</svg>
