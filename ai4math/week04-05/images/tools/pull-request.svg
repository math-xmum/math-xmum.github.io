<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520">
  <rect width="900" height="520" fill="#ffffff"/>
  <text x="450" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#003366">Pull Request = Diff + Discussion + Checks</text>
  <g font-family="Arial, sans-serif">
    <rect x="70" y="105" width="310" height="320" rx="14" fill="#f8f8ff" stroke="#0066cc" stroke-width="3"/>
    <text x="225" y="145" text-anchor="middle" font-size="23" font-weight="700" fill="#003366">Code Diff</text>
    <rect x="105" y="175" width="240" height="32" rx="5" fill="#ffe4e6"/>
    <text x="122" y="197" font-size="17" fill="#991b1b">- old fragile parser</text>
    <rect x="105" y="220" width="240" height="32" rx="5" fill="#dcfce7"/>
    <text x="122" y="242" font-size="17" fill="#166534">+ structured parser</text>
    <rect x="105" y="265" width="240" height="32" rx="5" fill="#dcfce7"/>
    <text x="122" y="287" font-size="17" fill="#166534">+ unit tests</text>
    <rect x="105" y="325" width="240" height="52" rx="8" fill="#ffffff" stroke="#d4ddff" stroke-width="2"/>
    <text x="225" y="357" text-anchor="middle" font-size="17" fill="#333">review the exact change</text>
    <rect x="450" y="105" width="180" height="145" rx="14" fill="#fff4e6" stroke="#e07000" stroke-width="3"/>
    <text x="540" y="145" text-anchor="middle" font-size="23" font-weight="700" fill="#7a3f00">Comments</text>
    <text x="540" y="184" text-anchor="middle" font-size="17" fill="#333">questions</text>
    <text x="540" y="214" text-anchor="middle" font-size="17" fill="#333">requested fixes</text>
    <rect x="450" y="280" width="180" height="145" rx="14" fill="#e8f8e8" stroke="#1a8a3a" stroke-width="3"/>
    <text x="540" y="320" text-anchor="middle" font-size="23" font-weight="700" fill="#0f5f28">Checks</text>
    <text x="540" y="359" text-anchor="middle" font-size="17" fill="#333">tests pass</text>
    <text x="540" y="389" text-anchor="middle" font-size="17" fill="#333">build passes</text>
    <rect x="700" y="190" width="130" height="150" rx="14" fill="#e6f0ff" stroke="#0066cc" stroke-width="3"/>
    <text x="765" y="245" text-anchor="middle" font-size="24" font-weight="700" fill="#003366">Merge</text>
    <text x="765" y="282" text-anchor="middle" font-size="18" fill="#333">only when</text>
    <text x="765" y="309" text-anchor="middle" font-size="18" fill="#333">ready</text>
  </g>
  <g stroke="#0066cc" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M380 265 L450 180"/>
    <path d="M380 285 L450 355"/>
    <path d="M630 180 C680 190 695 225 700 250"/>
    <path d="M630 355 C680 340 695 310 700 290"/>
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#0066cc"/></marker>
  </defs>
</svg>
