<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520">
  <rect width="900" height="520" fill="#ffffff"/>
  <text x="450" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#003366">Continuous Integration: Let the Repo Test Itself</text>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <rect x="65" y="170" width="125" height="82" rx="14" fill="#e6f0ff" stroke="#0066cc" stroke-width="3"/>
    <text x="127.5" y="203" font-size="21" font-weight="700" fill="#003366">Push</text>
    <text x="127.5" y="229" font-size="16" fill="#444">or PR</text>
    <rect x="240" y="170" width="125" height="82" rx="14" fill="#fff4e6" stroke="#e07000" stroke-width="3"/>
    <text x="302.5" y="203" font-size="21" font-weight="700" fill="#7a3f00">Install</text>
    <text x="302.5" y="229" font-size="16" fill="#444">deps</text>
    <rect x="415" y="170" width="125" height="82" rx="14" fill="#e8f8e8" stroke="#1a8a3a" stroke-width="3"/>
    <text x="477.5" y="203" font-size="21" font-weight="700" fill="#0f5f28">Test</text>
    <text x="477.5" y="229" font-size="16" fill="#444">unit + smoke</text>
    <rect x="590" y="170" width="125" height="82" rx="14" fill="#f8f8ff" stroke="#5b5fc7" stroke-width="3"/>
    <text x="652.5" y="203" font-size="21" font-weight="700" fill="#33338a">Build</text>
    <text x="652.5" y="229" font-size="16" fill="#444">slides / app</text>
    <rect x="765" y="170" width="90" height="82" rx="14" fill="#e8f8e8" stroke="#1a8a3a" stroke-width="3"/>
    <text x="810" y="203" font-size="21" font-weight="700" fill="#0f5f28">Pass</text>
    <text x="810" y="229" font-size="16" fill="#444">or fail</text>
  </g>
  <g stroke="#0066cc" stroke-width="4" marker-end="url(#arrow)">
    <path d="M190 211 L240 211"/>
    <path d="M365 211 L415 211"/>
    <path d="M540 211 L590 211"/>
    <path d="M715 211 L765 211"/>
  </g>
  <rect x="185" y="330" width="530" height="72" rx="12" fill="#f8f8ff" stroke="#d4ddff" stroke-width="3"/>
  <text x="450" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#003366">The useful question is not "did it run on my laptop?"</text>
  <text x="450" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" fill="#333">It is "can a clean machine reproduce it?"</text>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#0066cc"/></marker>
  </defs>
</svg>
