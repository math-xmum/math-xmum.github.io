<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520">
  <rect width="900" height="520" fill="#ffffff"/>
  <text x="450" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#003366">Agent Permissions: Keep a Human Gate</text>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <rect x="95" y="120" width="190" height="250" rx="16" fill="#e8f8e8" stroke="#1a8a3a" stroke-width="3"/>
    <text x="190" y="168" font-size="24" font-weight="700" fill="#0f5f28">Allow</text>
    <text x="190" y="214" font-size="18" fill="#333">read files</text>
    <text x="190" y="250" font-size="18" fill="#333">run tests</text>
    <text x="190" y="286" font-size="18" fill="#333">format code</text>
    <rect x="355" y="120" width="190" height="250" rx="16" fill="#fff4e6" stroke="#e07000" stroke-width="3"/>
    <text x="450" y="168" font-size="24" font-weight="700" fill="#7a3f00">Ask First</text>
    <text x="450" y="214" font-size="18" fill="#333">large rewrites</text>
    <text x="450" y="250" font-size="18" fill="#333">network calls</text>
    <text x="450" y="286" font-size="18" fill="#333">install packages</text>
    <rect x="615" y="120" width="190" height="250" rx="16" fill="#fff0f0" stroke="#cc2222" stroke-width="3"/>
    <text x="710" y="168" font-size="24" font-weight="700" fill="#991b1b">Block</text>
    <text x="710" y="214" font-size="18" fill="#333">secrets</text>
    <text x="710" y="250" font-size="18" fill="#333">destructive git</text>
    <text x="710" y="286" font-size="18" fill="#333">unreviewed deploy</text>
  </g>
  <rect x="190" y="405" width="520" height="58" rx="12" fill="#e6f0ff" stroke="#0066cc" stroke-width="3"/>
  <text x="450" y="441" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#003366">Good agent use is permission design, not blind trust.</text>
</svg>
