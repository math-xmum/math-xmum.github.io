<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520">
  <rect width="900" height="520" fill="#ffffff"/>
  <text x="450" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#003366">What Goes Into Agent Context?</text>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <rect x="335" y="195" width="230" height="120" rx="20" fill="#e6f0ff" stroke="#0066cc" stroke-width="4"/>
    <text x="450" y="246" font-size="25" font-weight="700" fill="#003366">Agent</text>
    <text x="450" y="278" font-size="18" fill="#333">model + harness</text>
    <rect x="80" y="90" width="210" height="74" rx="12" fill="#fff4e6" stroke="#e07000" stroke-width="3"/>
    <text x="185" y="120" font-size="21" font-weight="700" fill="#7a3f00">Task Prompt</text>
    <text x="185" y="146" font-size="16" fill="#333">what should change?</text>
    <rect x="345" y="80" width="210" height="74" rx="12" fill="#e8f8e8" stroke="#1a8a3a" stroke-width="3"/>
