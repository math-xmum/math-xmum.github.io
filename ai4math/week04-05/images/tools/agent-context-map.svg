    <rect x="610" y="90" width="210" height="74" rx="12" fill="#f8f8ff" stroke="#5b5fc7" stroke-width="3"/>
    <text x="715" y="120" font-size="21" font-weight="700" fill="#33338a">Repo Files</text>
