    <text x="200" y="416" font-size="16" fill="#333">shell, search, tests</text>
    <rect x="345" y="370" width="210" height="74" rx="12" fill="#fff4e6" stroke="#e07000" stroke-width="3"/>
    <text x="450" y="400" font-size="21" font-weight="700" fill="#7a3f00">Conversation</text>
