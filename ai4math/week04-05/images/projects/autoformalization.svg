  <text x="395" y="250" font-family="Menlo, monospace" font-size="18" fill="#dbeafe">(h : Even n) :</text>
  <text x="395" y="280" font-family="Menlo, monospace" font-size="18" fill="#dbeafe">Even (n*n) := by</text>
