<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Minimal prover agent retry loop">
  <rect width="800" height="500" rx="28" fill="#f7fbff"/>
  <text x="400" y="54" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#003366">Minimal Prover Agent</text>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#0066cc"/></marker></defs>
  <rect x="90" y="130" width="170" height="78" rx="14" fill="#e6f0ff" stroke="#0066cc" stroke-width="4"/>
  <text x="175" y="177" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#003366">LLM</text>
  <rect x="315" y="130" width="170" height="78" rx="14" fill="#fff4e6" stroke="#e07000" stroke-width="4"/>
  <text x="400" y="177" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#7a3f00">Lean</text>
  <rect x="540" y="130" width="170" height="78" rx="14" fill="#e8f8e8" stroke="#1a8a3a" stroke-width="4"/>
  <text x="625" y="177" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#0d5c25">checked</text>
  <path d="M260 169 H308" stroke="#0066cc" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M485 169 H533" stroke="#0066cc" stroke-width="5" marker-end="url(#arrow)"/>
  <rect x="267" y="285" width="266" height="82" rx="14" fill="white" stroke="#003366" stroke-width="4"/>
  <text x="400" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#003366">error feedback</text>
  <text x="400" y="347" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#003366">retry up to N times</text>
  <path d="M400 208 V278" stroke="#0066cc" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M267 326 H175 V215" stroke="#0066cc" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
  <text x="400" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#003366">Measure success rate, attempts, and common Lean errors.</text>
</svg>
