  <text x="685" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#0d5c25">new cases</text>
  <text x="400" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#003366">Useful conjectures must survive counterexample search.</text>
