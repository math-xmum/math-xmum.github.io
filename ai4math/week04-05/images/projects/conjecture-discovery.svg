  <rect x="80" y="112" width="190" height="245" rx="14" fill="white" stroke="#0066cc" stroke-width="4"/>
  <text x="175" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#003366">finite data</text>
  <circle cx="135" cy="210" r="10" fill="#0066cc"/><circle cx="170" cy="250" r="10" fill="#0066cc"/><circle cx="215" cy="190" r="10" fill="#0066cc"/>
  <circle cx="150" cy="305" r="10" fill="#0066cc"/><circle cx="230" cy="285" r="10" fill="#0066cc"/>
  <path d="M270 235 H348" stroke="#0066cc" stroke-width="6"/>
  <rect x="355" y="150" width="190" height="160" rx="14" fill="#fff4e6" stroke="#e07000" stroke-width="4"/>
  <text x="450" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#7a3f00">pattern</text>
  <text x="450" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#7a3f00">search</text>
  <path d="M545 235 H620" stroke="#0066cc" stroke-width="6"/>
  <rect x="625" y="112" width="120" height="245" rx="14" fill="#e8f8e8" stroke="#1a8a3a" stroke-width="4"/>
  <text x="685" y="194" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#0d5c25">candidate</text>
