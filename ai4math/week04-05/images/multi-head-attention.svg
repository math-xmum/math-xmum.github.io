  <path d="M485 201 C535 215 555 225 590 238" stroke="#0066cc" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M485 279 C535 265 555 255 590 250" stroke="#0066cc" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
