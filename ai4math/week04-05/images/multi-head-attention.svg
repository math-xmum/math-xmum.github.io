  <path d="M730 247 H780" stroke="#0066cc" stroke-width="5" marker-end="url(#arrow)"/>
  <rect x="795" y="204" width="60" height="86" rx="16" fill="#e8f8e8" stroke="#1a8a3a" stroke-width="4"/>
