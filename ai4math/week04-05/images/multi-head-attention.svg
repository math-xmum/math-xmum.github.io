  <rect x="275" y="250" width="210" height="58" rx="14" fill="#e8f8e8" stroke="#1a8a3a" stroke-width="4"/>
  <text x="380" y="286" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0d5c25">head 3: topic cue</text>
