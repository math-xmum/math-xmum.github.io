  <rect x="154" y="424" width="592" height="44" rx="12" fill="white" stroke="#003366" stroke-width="3"/>
  <text x="450" y="452" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#003366">The names above are intuition only. Heads are learned components, not hand-coded modules.</text>
