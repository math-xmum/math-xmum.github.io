<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" role="img" aria-label="Transformer block diagram">
  <rect width="900" height="500" rx="26" fill="#f7fbff"/>
  <text x="450" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#003366">Transformer Block: Repeated Many Times</text>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#0066cc"/></marker></defs>
  <rect x="95" y="105" width="160" height="70" rx="14" fill="#e6f0ff" stroke="#0066cc" stroke-width="4"/>
  <text x="175" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#003366">input vectors</text>
  <path d="M255 140 H320" stroke="#0066cc" stroke-width="5" marker-end="url(#arrow)"/>
  <rect x="335" y="95" width="210" height="90" rx="16" fill="#fff4e6" stroke="#e07000" stroke-width="4"/>
  <text x="440" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#7a3f00">self-attention</text>
  <text x="440" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#7a3f00">mix information across tokens</text>
  <path d="M545 140 H610" stroke="#0066cc" stroke-width="5" marker-end="url(#arrow)"/>
  <rect x="625" y="95" width="185" height="90" rx="16" fill="#e8f8e8" stroke="#1a8a3a" stroke-width="4"/>
  <text x="718" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#0d5c25">feed-forward</text>
  <text x="718" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#0d5c25">transform each position</text>
  <rect x="250" y="260" width="400" height="76" rx="16" fill="white" stroke="#003366" stroke-width="4"/>
  <text x="450" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#003366">plus residual connections and layer normalization</text>
  <text x="450" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#003366">these stabilize very deep networks</text>
  <path d="M718 185 V230 H450 V253" stroke="#0066cc" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
  <rect x="195" y="390" width="510" height="58" rx="14" fill="#eef5ff" stroke="#0066cc" stroke-width="3"/>
  <text x="450" y="426" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#003366">A large LLM stacks many blocks, then predicts the next-token distribution.</text>
</svg>
