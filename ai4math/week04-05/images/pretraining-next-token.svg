<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" role="img" aria-label="Next-token pretraining objective">
  <rect width="900" height="500" rx="26" fill="#f7fbff"/>
  <text x="450" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#003366">Pretraining: Predict the Next Token</text>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#0066cc"/></marker></defs>
  <rect x="70" y="120" width="500" height="115" rx="16" fill="white" stroke="#0066cc" stroke-width="4"/>
  <text x="320" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#003366">context</text>
  <text x="320" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#003366">The prime number theorem says that</text>
  <path d="M570 178 H645" stroke="#0066cc" stroke-width="6" marker-end="url(#arrow)"/>
  <rect x="660" y="120" width="170" height="115" rx="16" fill="#fff4e6" stroke="#e07000" stroke-width="4"/>
  <text x="745" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#7a3f00">target</text>
  <text x="745" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#7a3f00">π</text>
  <rect x="175" y="300" width="550" height="82" rx="16" fill="#e8f8e8" stroke="#1a8a3a" stroke-width="4"/>
  <text x="450" y="333" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#0d5c25">loss</text>
  <text x="450" y="363" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" fill="#0d5c25">penalize the model when the correct next token has low probability</text>
  <text x="450" y="443" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#003366">Repeating this over huge corpora teaches grammar, facts, style, code patterns, and reasoning patterns.</text>
</svg>
