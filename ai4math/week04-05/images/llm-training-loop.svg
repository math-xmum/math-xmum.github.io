<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" role="img" aria-label="LLM training loop">
  <rect width="900" height="500" rx="26" fill="#f7fbff"/>
  <text x="450" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#003366">The Training Loop</text>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#0066cc"/></marker></defs>
  <rect x="75" y="125" width="150" height="82" rx="14" fill="#e6f0ff" stroke="#0066cc" stroke-width="4"/>
  <text x="150" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#003366">batch</text>
  <text x="150" y="187" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#003366">token sequences</text>
  <rect x="285" y="125" width="150" height="82" rx="14" fill="#fff4e6" stroke="#e07000" stroke-width="4"/>
  <text x="360" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#7a3f00">model</text>
  <text x="360" y="187" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#7a3f00">parameters</text>
  <rect x="495" y="125" width="150" height="82" rx="14" fill="#e8f8e8" stroke="#1a8a3a" stroke-width="4"/>
  <text x="570" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#0d5c25">loss</text>
  <text x="570" y="187" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#0d5c25">prediction error</text>
  <rect x="705" y="125" width="150" height="82" rx="14" fill="white" stroke="#003366" stroke-width="4"/>
  <text x="780" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#003366">gradient</text>
  <text x="780" y="187" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#003366">update signal</text>
  <path d="M225 166 H278 M435 166 H488 M645 166 H698" stroke="#0066cc" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M780 207 V305 H360 V214" stroke="#0066cc" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
  <rect x="225" y="335" width="450" height="72" rx="16" fill="#eef5ff" stroke="#0066cc" stroke-width="4"/>
  <text x="450" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#003366">repeat billions or trillions of token predictions</text>
  <text x="450" y="392" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#003366">the learned behavior is stored in the weights</text>
</svg>
