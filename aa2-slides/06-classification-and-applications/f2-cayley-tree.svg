<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" role="img" aria-labelledby="title desc">
  <title id="title">Partial Cayley graph of the free group F(a,b)</title>
  <desc id="desc">A finite window of the four-valent Cayley tree of the free group on a and b.</desc>
  <defs>
    <style>
      .bg { fill: #fffdf8; }
      .edge-a { stroke: #b94e36; stroke-width: 5; stroke-linecap: round; }
      .edge-b { stroke: #2f6f95; stroke-width: 5; stroke-linecap: round; }
      .edge-fade-a { stroke: #b94e36; stroke-width: 3.2; stroke-linecap: round; opacity: .26; }
      .edge-fade-b { stroke: #2f6f95; stroke-width: 3.2; stroke-linecap: round; opacity: .26; }
      .node { fill: #fffdf8; stroke: #232323; stroke-width: 2.4; }
      .root { fill: #232323; stroke: #232323; }
      .label { font-family: "Times New Roman", Times, serif; font-size: 25px; font-style: italic; fill: #202020; text-anchor: middle; dominant-baseline: middle; }
      .tiny { font-size: 20px; }
      .key { font-family: "Times New Roman", Times, serif; font-size: 22px; fill: #202020; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="920" height="520" rx="20"/>

  <!-- Faded continuation of the tree. -->
  <line class="edge-fade-a" x1="270" y1="260" x2="200" y2="130"/>
  <line class="edge-fade-b" x1="270" y1="260" x2="190" y2="260"/>
  <line class="edge-fade-b" x1="270" y1="260" x2="200" y2="390"/>
  <line class="edge-fade-a" x1="650" y1="260" x2="720" y2="130"/>
  <line class="edge-fade-b" x1="650" y1="260" x2="730" y2="260"/>
  <line class="edge-fade-b" x1="650" y1="260" x2="720" y2="390"/>
  <line class="edge-fade-b" x1="460" y1="70" x2="330" y2="20"/>
  <line class="edge-fade-a" x1="460" y1="70" x2="460" y2="0"/>
  <line class="edge-fade-a" x1="460" y1="70" x2="590" y2="20"/>
  <line class="edge-fade-b" x1="460" y1="450" x2="330" y2="500"/>
  <line class="edge-fade-a" x1="460" y1="450" x2="460" y2="520"/>
  <line class="edge-fade-a" x1="460" y1="450" x2="590" y2="500"/>

  <!-- Main first layer. -->
  <line class="edge-a" x1="460" y1="260" x2="270" y2="260"/>
  <line class="edge-a" x1="460" y1="260" x2="650" y2="260"/>
  <line class="edge-b" x1="460" y1="260" x2="460" y2="70"/>
  <line class="edge-b" x1="460" y1="260" x2="460" y2="450"/>

  <!-- Second layer. -->
  <line class="edge-a" x1="270" y1="260" x2="200" y2="130"/>
  <line class="edge-b" x1="270" y1="260" x2="190" y2="260"/>
  <line class="edge-b" x1="270" y1="260" x2="200" y2="390"/>
  <line class="edge-a" x1="650" y1="260" x2="720" y2="130"/>
  <line class="edge-b" x1="650" y1="260" x2="730" y2="260"/>
  <line class="edge-b" x1="650" y1="260" x2="720" y2="390"/>
  <line class="edge-b" x1="460" y1="70" x2="330" y2="20"/>
  <line class="edge-a" x1="460" y1="70" x2="460" y2="0"/>
  <line class="edge-a" x1="460" y1="70" x2="590" y2="20"/>
  <line class="edge-b" x1="460" y1="450" x2="330" y2="500"/>
  <line class="edge-a" x1="460" y1="450" x2="460" y2="520"/>
  <line class="edge-a" x1="460" y1="450" x2="590" y2="500"/>

  <!-- Nodes. -->
  <circle class="root" cx="460" cy="260" r="15"/>
  <circle class="node" cx="270" cy="260" r="18"/>
  <circle class="node" cx="650" cy="260" r="18"/>
  <circle class="node" cx="460" cy="70" r="18"/>
  <circle class="node" cx="460" cy="450" r="18"/>

  <circle class="node" cx="200" cy="130" r="14"/>
  <circle class="node" cx="190" cy="260" r="14"/>
  <circle class="node" cx="200" cy="390" r="14"/>
  <circle class="node" cx="720" cy="130" r="14"/>
  <circle class="node" cx="730" cy="260" r="14"/>
  <circle class="node" cx="720" cy="390" r="14"/>
  <circle class="node" cx="330" cy="20" r="14"/>
  <circle class="node" cx="460" cy="0" r="14"/>
  <circle class="node" cx="590" cy="20" r="14"/>
  <circle class="node" cx="330" cy="500" r="14"/>
  <circle class="node" cx="460" cy="520" r="14"/>
  <circle class="node" cx="590" cy="500" r="14"/>

  <!-- Labels. -->
  <text class="label" x="460" y="292">1</text>
  <text class="label" x="270" y="292">a<tspan baseline-shift="super" font-size="14">-1</tspan></text>
  <text class="label" x="650" y="292">a</text>
  <text class="label" x="460" y="102">b</text>
  <text class="label" x="460" y="418">b<tspan baseline-shift="super" font-size="14">-1</tspan></text>

  <text class="label tiny" x="165" y="115">a<tspan baseline-shift="super" font-size="12">-2</tspan></text>
  <text class="label tiny" x="150" y="260">a<tspan baseline-shift="super" font-size="12">-1</tspan>b</text>
  <text class="label tiny" x="160" y="405">a<tspan baseline-shift="super" font-size="12">-1</tspan>b<tspan baseline-shift="super" font-size="12">-1</tspan></text>
  <text class="label tiny" x="755" y="115">a<tspan baseline-shift="super" font-size="12">2</tspan></text>
  <text class="label tiny" x="780" y="260">ab</text>
  <text class="label tiny" x="770" y="405">ab<tspan baseline-shift="super" font-size="12">-1</tspan></text>

  <text class="key" x="28" y="42">red edges: multiply by a or a<tspan baseline-shift="super" font-size="13">-1</tspan></text>
  <text class="key" x="28" y="76">blue edges: multiply by b or b<tspan baseline-shift="super" font-size="13">-1</tspan></text>
</svg>
